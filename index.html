<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Magic Kidney — 매지 LAB</title>
  <meta name="description" content="Magic Kidney 마스코트 · 로고 디자인 랩 — 캐릭터 20종 / 로고 24종">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{background:#F2F0EA;font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#A09BBC;font-size:14px;font-weight:700}
  </style>
</head>
<body>
  <div id="root"><div id="boot">매지 LAB 불러오는 중…</div></div>
  <noscript><div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#888">JavaScript가 필요합니다.</div></noscript>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
// Magic Kidney — Mascot + Logo LAB (designer hand-off).
// Tab 1: 캐릭터 12 styles. Tab 2: 로고 10 options (incl. flipped/inverted versions).
// Selection persists — designer picks, copies the option name.

const F = "'Pretendard Variable', Pretendard, system-ui, sans-serif";
const MONO = "'JetBrains Mono', ui-monospace, monospace";

const PAL = {
  line:'#3A3550', hat:'#6B62C9', hatHi:'#8B82E0', hatBand:'#534AA8',
  pom:'#F4C84A', spark:'#F4C84A', blush:'#F4A8C0', mouth:'#E0608A', tongue:'#F48BB0',
  ink:'#2A2740', soft:'#6E698C', faint:'#A09BBC', cardLine:'rgba(42,39,64,0.10)',
};
const BODY_COLORS = [
  ['#C9C4F0','라벤더'], ['#A7D8C4','민트'], ['#F4C6A8','피치'], ['#A8CCEC','스카이'], ['#F0B8D0','로즈'],
];
const BGS = [
  ['paper','#FBFAFF','페이퍼'], ['lav','#EDEAF9','라벤더'], ['dark','#23203A','다크'], ['brand','#6B62C9','브랜드'],
];

// ── shared face parts ──
function Eyes({ style, mood, L=78, R=122, EY=128, line=PAL.line, rx=9, ry=12, hi=true, sw=5 }) {
  const closed = (d) => <path d={d} stroke={line} strokeWidth={sw} fill="none" strokeLinecap="round"/>;
  if (mood==='sleepy') return <g>{closed(`M${L-9} ${EY} q9 7 18 0`)}{closed(`M${R-9} ${EY} q9 7 18 0`)}</g>;
  if (mood==='proud')  return <g>{closed(`M${L-9} ${EY+2} q9 -7 18 0`)}{closed(`M${R-9} ${EY+2} q9 -7 18 0`)}</g>;
  const open = (x)=>(<g><ellipse cx={x} cy={EY} rx={rx} ry={ry} fill={line}/>{hi&&<circle cx={x+rx*0.33} cy={EY-ry*0.33} r={rx*0.36} fill="#FFF"/>}</g>);
  if (mood==='wink') return <g>{open(L)}{closed(`M${R-9} ${EY+2} q9 6 18 0`)}</g>;
  return <g>{open(L)}{open(R)}</g>;
}
function MouthShape({ mood, line=PAL.line, sw=4.5 }) {
  if (mood==='sleepy') return <ellipse cx="100" cy="150" rx="5" ry="6" fill={PAL.mouth}/>;
  if (mood==='surprised') return <ellipse cx="100" cy="152" rx="8" ry="9" fill={PAL.mouth}/>;
  if (mood==='smile'||mood==='proud') return <path d="M88 150 q12 8 24 0" stroke={line} strokeWidth={sw} fill="none" strokeLinecap="round"/>;
  return (<g><path d="M88 148 Q100 164 112 148 Q100 158 88 148 Z" fill={line}/><ellipse cx="100" cy="155" rx="5" ry="4" fill={PAL.tongue}/></g>);
}
function Spark({ x, y, s=1, c=PAL.spark }) {
  return <g transform={`translate(${x} ${y}) scale(${s})`}><path d="M0 -9 C1 -3 3 -1 9 0 C3 1 1 3 0 9 C-1 3 -3 1 -9 0 C-3 -1 -1 -3 0 -9 Z" fill={c}/></g>;
}
function HatFull() {
  return <g><path d={HAT_PATH} fill={PAL.hat} stroke={PAL.line} strokeWidth="5" strokeLinejoin="round"/><path d="M70 60 Q100 72 130 60" stroke={PAL.hatBand} strokeWidth="9" fill="none" strokeLinecap="round"/><ellipse cx="106" cy="16" rx="8" ry="8" fill={PAL.pom} stroke={PAL.line} strokeWidth="4"/><path d="M92 26 L100 44" stroke={PAL.hatHi} strokeWidth="4" strokeLinecap="round" opacity="0.7"/></g>;
}
const HAT_PATH = "M64 70 Q100 84 136 70 L112 18 Q100 12 100 12 Q100 12 88 18 Z";
const CUR_BODY = "M100 64 C140 64 162 92 162 130 C162 166 134 184 100 184 C66 184 38 166 38 130 C38 92 60 64 100 64 Z";
const SK_BODY  = "M100 70 C146 70 166 96 166 134 C166 168 138 184 100 184 C62 184 34 168 34 134 C34 96 54 70 100 70 Z";
function px(c, r, w, h, fill) { return <rect key={`${c}-${r}-${fill}`} x={c*10} y={r*10} width={w*10} height={h*10} fill={fill}/>; }

// ── the character, 12 styles ──
function Wiz({ size=160, style='current', mood='happy', hat=true, body='#C9C4F0', sparkle=true, onDark=false }) {
  const uid = React.useId().replace(/[:]/g,'');
  const line = style==='line' ? (onDark ? '#FFFFFF' : PAL.line) : PAL.line;

  if (style==='pixel') {
    const B=body, H=PAL.hat, D=PAL.line, P2=PAL.blush, M=PAL.mouth, Y=PAL.pom;
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" shapeRendering="crispEdges">
        {hat && <g>{px(9,1,2,1,Y)}{px(9,2,2,2,H)}{px(8,4,4,1,H)}{px(7,5,6,1,H)}{px(6,6,8,1,D)}</g>}
        {px(7,7,6,1,B)}{px(6,8,8,1,B)}{px(5,9,10,1,B)}{px(4,10,12,7,B)}{px(5,17,10,1,B)}
        {mood==='sleepy'||mood==='proud'
          ? <g>{px(7,12,2,0.6,D)}{px(11,12,2,0.6,D)}</g>
          : <g>{px(7,11,1.6,2,D)}{mood!=='wink'&&px(11.4,11,1.6,2,D)}{mood==='wink'&&px(11.4,12,1.6,0.6,D)}</g>}
        {px(5.4,14,1.6,1,P2)}{px(13,14,1.6,1,P2)}
        {mood==='surprised' ? px(9.4,14,1.4,1.4,M) : px(9,14.4,2,1,M)}
        {sparkle && <g>{px(2.4,8,1,1,Y)}{px(16.6,7,1,1,Y)}</g>}
      </svg>
    );
  }
  if (style==='retro') {
    const cream='#F2E9D5', ink='#26221B';
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <path d={CUR_BODY} fill={cream} stroke={ink} strokeWidth="6"/>
        {hat && <g><path d={HAT_PATH} fill={ink}/><circle cx="106" cy="16" r="8" fill={cream} stroke={ink} strokeWidth="5"/></g>}
        {mood==='sleepy'||mood==='proud'
          ? <g><path d="M69 128 q9 7 18 0" stroke={ink} strokeWidth="5" fill="none" strokeLinecap="round"/><path d="M113 128 q9 7 18 0" stroke={ink} strokeWidth="5" fill="none" strokeLinecap="round"/></g>
          : <g>
              <path d="M78 116 A12 12 0 1 0 78.01 116 Z M78 128 L78 114 A12 12 0 0 1 89 122 Z" fill={ink} fillRule="evenodd"/>
              {mood!=='wink'
                ? <path d="M122 116 A12 12 0 1 0 122.01 116 Z M122 128 L122 114 A12 12 0 0 1 133 122 Z" fill={ink} fillRule="evenodd"/>
                : <path d="M113 128 q9 6 18 0" stroke={ink} strokeWidth="5" fill="none" strokeLinecap="round"/>}
            </g>}
        {mood==='surprised'
          ? <ellipse cx="100" cy="152" rx="8" ry="10" fill={ink}/>
          : <path d="M84 148 q16 14 32 0" stroke={ink} strokeWidth="5" fill="none" strokeLinecap="round"/>}
        <g stroke={ink} strokeWidth="2" opacity="0.6"><path d="M60 144 l8 6M64 142 l8 6"/><path d="M132 144 l8 6M136 142 l8 6"/></g>
        {sparkle && <g fill={ink}><Spark x={36} y={84} c={ink} s={0.8}/><Spark x={166} y={80} c={ink} s={0.9}/></g>}
      </svg>
    );
  }
  if (style==='clay') {
    const dark = '#00000022', lite='#FFFFFF55';
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <ellipse cx="100" cy="190" rx="56" ry="9" fill={PAL.ink} opacity="0.15"/>
        <path d="M100 66 C138 62 164 94 161 132 C158 168 132 186 99 184 C65 182 37 164 39 128 C41 94 62 70 100 66 Z" fill={body}/>
        <path d="M52 150 C66 174 134 176 150 148 C140 170 64 172 52 150 Z" fill={dark}/>
        <ellipse cx="74" cy="98" rx="22" ry="15" fill={lite}/>
        {hat && <g>
          <path d="M66 72 Q100 86 134 70 L114 22 Q101 14 99 15 Q98 15 87 22 Z" fill={PAL.hat}/>
          <path d="M70 66 Q100 78 130 64 L128 60 Q100 72 72 62 Z" fill="#00000026"/>
          <circle cx="107" cy="18" r="9" fill={PAL.pom}/>
          <ellipse cx="104" cy="15" rx="3.5" ry="2.5" fill="#FFFFFF66"/>
        </g>}
        <Eyes style={style} mood={mood} rx={7.5} ry={9} sw={6}/>
        <MouthShape mood={mood} sw={5}/>
        <ellipse cx="66" cy="146" rx="10" ry="6" fill={PAL.blush} opacity="0.8"/>
        <ellipse cx="134" cy="146" rx="10" ry="6" fill={PAL.blush} opacity="0.8"/>
      </svg>
    );
  }
  if (style==='kawaii') {
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <path d="M100 58 C146 58 168 92 168 132 C168 170 138 188 100 188 C62 188 32 170 32 132 C32 92 54 58 100 58 Z" fill={body}/>
        <ellipse cx="100" cy="152" rx="40" ry="28" fill="#FFFFFF" opacity="0.75"/>
        {hat && <g><path d="M70 64 Q100 76 130 64 L110 22 Q100 16 100 16 Q100 16 90 22 Z" fill={PAL.hat}/><circle cx="104" cy="19" r="6.5" fill={PAL.pom}/></g>}
        {mood==='sleepy'||mood==='proud'
          ? <g><path d="M62 124 q7 5 14 0" stroke={PAL.line} strokeWidth="4" fill="none" strokeLinecap="round"/><path d="M124 124 q7 5 14 0" stroke={PAL.line} strokeWidth="4" fill="none" strokeLinecap="round"/></g>
          : <g><ellipse cx="69" cy="124" rx="5" ry="7" fill={PAL.line}/>{mood!=='wink' ? <ellipse cx="131" cy="124" rx="5" ry="7" fill={PAL.line}/> : <path d="M124 124 q7 5 14 0" stroke={PAL.line} strokeWidth="4" fill="none" strokeLinecap="round"/>}</g>}
        {mood==='surprised' ? <ellipse cx="100" cy="138" rx="5" ry="6" fill={PAL.mouth}/> : <path d="M94 136 q6 5 12 0" stroke={PAL.line} strokeWidth="3.5" fill="none" strokeLinecap="round"/>}
        <ellipse cx="56" cy="136" rx="9" ry="6" fill={PAL.blush} opacity="0.85"/>
        <ellipse cx="144" cy="136" rx="9" ry="6" fill={PAL.blush} opacity="0.85"/>
        {sparkle && <><Spark x={34} y={78} s={0.8}/><Spark x={168} y={74}/></>}
      </svg>
    );
  }
  if (style==='papercut') {
    const shadow='#00000030';
    const bodyPoly = "M100 66 L146 80 L162 128 L146 172 L100 184 L54 172 L38 128 L54 80 Z";
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <path d={bodyPoly} fill={shadow} transform="translate(6 7)"/>
        <path d={bodyPoly} fill={body}/>
        <path d="M100 66 L146 80 L162 128 L100 120 Z" fill="#FFFFFF" opacity="0.25"/>
        {hat && <g><path d="M66 72 L134 68 L112 20 L88 22 Z" fill={shadow} transform="translate(5 5)"/><path d="M66 72 L134 68 L112 20 L88 22 Z" fill={PAL.hat}/><circle cx="104" cy="18" r="8" fill={PAL.pom}/></g>}
        <Eyes style={style} mood={mood} rx={8} ry={10} hi={false} sw={5}/>
        <MouthShape mood={mood} sw={4.5}/>
        <path d="M58 142 L76 148 L58 152 Z" fill={PAL.blush} opacity="0.8"/>
        <path d="M142 142 L124 148 L142 152 Z" fill={PAL.blush} opacity="0.8"/>
        {sparkle && <><Spark x={34} y={80}/><Spark x={168} y={76} s={1.1}/></>}
      </svg>
    );
  }
  if (style==='pop') {
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <defs><pattern id={`${uid}ht`} width="9" height="9" patternUnits="userSpaceOnUse"><circle cx="2.5" cy="2.5" r="1.7" fill={PAL.line} opacity="0.25"/></pattern></defs>
        <path d={CUR_BODY} fill={body} stroke={PAL.line} strokeWidth="9"/>
        <path d="M48 130 C48 160 70 178 100 178 C130 178 152 160 152 130 L152 142 C148 168 128 182 100 182 C72 182 52 168 48 142 Z" fill={`url(#${uid}ht)`}/>
        <ellipse cx="74" cy="100" rx="18" ry="12" fill="#FFF" opacity="0.7"/>
        {hat && <g><path d={HAT_PATH} fill={PAL.hat} stroke={PAL.line} strokeWidth="9" strokeLinejoin="round"/><circle cx="106" cy="16" r="9" fill={PAL.pom} stroke={PAL.line} strokeWidth="6"/></g>}
        <Eyes style={style} mood={mood} rx={10} ry={13} sw={6}/>
        <MouthShape mood={mood} sw={5.5}/>
        <ellipse cx="64" cy="146" rx="11" ry="7" fill={PAL.blush}/>
        <ellipse cx="136" cy="146" rx="11" ry="7" fill={PAL.blush}/>
        {sparkle && <path d="M168 66 L173 78 L186 80 L176 88 L179 101 L168 94 L157 101 L160 88 L150 80 L163 78 Z" fill={PAL.pom} stroke={PAL.line} strokeWidth="4" strokeLinejoin="round"/>}
      </svg>
    );
  }


  if (style==='jelly') {
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <defs><radialGradient id={uid+'j'} cx="0.4" cy="0.32" r="0.85"><stop offset="0" stopColor="#FFFFFF" stopOpacity="0.9"/><stop offset="0.4" stopColor={body} stopOpacity="0.95"/><stop offset="1" stopColor="#B3ACEC"/></radialGradient></defs>
        {sparkle && <><Spark x={168} y={78} s={1.1}/><Spark x={34} y={90}/></>}
        <path d={CUR_BODY} fill={`url(#${uid}j)`} stroke="#B3ACEC" strokeWidth="3" strokeOpacity="0.6"/>
        <path d="M52 150 C70 176 130 176 148 150 C140 172 60 172 52 150 Z" fill="#9A91D9" opacity="0.35"/>
        <ellipse cx="80" cy="100" rx="26" ry="18" fill="#FFFFFF" opacity="0.75"/>
        <circle cx="120" cy="96" r="6" fill="#FFFFFF" opacity="0.9"/>
        {hat && <HatFull/>}
        <Eyes style={style} mood={mood}/><MouthShape mood={mood}/>
        <ellipse cx="66" cy="146" rx="11" ry="7" fill={PAL.blush} opacity="0.55"/><ellipse cx="134" cy="146" rx="11" ry="7" fill={PAL.blush} opacity="0.55"/>
      </svg>
    );
  }
  if (style==='gradient') {
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <defs>
          <linearGradient id={uid+'g'} x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#CFC5F2"/><stop offset="0.5" stopColor="#B8D6E8"/><stop offset="1" stopColor="#F4C6C0"/></linearGradient>
          <linearGradient id={uid+'gh'} x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#8B82E0"/><stop offset="1" stopColor="#6B62C9"/></linearGradient></defs>
        {sparkle && <><Spark x={168} y={80} s={1.1}/><Spark x={36} y={88}/></>}
        <path d={CUR_BODY} fill={`url(#${uid}g)`}/>
        <ellipse cx="84" cy="98" rx="30" ry="18" fill="#FFFFFF" opacity="0.28"/>
        {hat && <g><path d={HAT_PATH} fill={`url(#${uid}gh)`}/><ellipse cx="106" cy="16" rx="8" ry="8" fill={PAL.pom}/></g>}
        <Eyes style={style} mood={mood}/><MouthShape mood={mood}/>
        <ellipse cx="66" cy="146" rx="11" ry="7" fill={PAL.blush} opacity="0.6"/><ellipse cx="134" cy="146" rx="11" ry="7" fill={PAL.blush} opacity="0.6"/>
      </svg>
    );
  }
  if (style==='mochi') {
    const R="M100 74 C150 74 174 100 174 134 C174 166 142 184 100 184 C58 184 26 166 26 134 C26 100 50 74 100 74 Z";
    const dust=[[70,98,2],[88,90,1.6],[112,92,1.8],[130,100,2],[78,112,1.5],[122,110,1.6],[100,86,1.7],[150,118,1.6],[52,120,1.5]];
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <ellipse cx="100" cy="192" rx="58" ry="9" fill={PAL.ink} opacity="0.10"/>
        <path d={R} fill="#E0DBF7"/><path d={R} fill="none" stroke="#C3BBEE" strokeWidth="3"/>
        <path d="M44 158 C64 180 136 180 156 158 C148 176 52 176 44 158 Z" fill="#CFC8F0" opacity="0.55"/>
        {dust.map(([x,y,r],i)=><circle key={i} cx={x} cy={y} r={r} fill="#FFFFFF" opacity="0.9"/>)}
        {hat && <g><path d="M76 70 Q100 82 124 70 L110 30 Q100 24 100 24 Q100 24 90 30 Z" fill={PAL.hat}/><circle cx="104" cy="26" r="6.5" fill={PAL.pom}/></g>}
        <Eyes style={style} mood={mood} rx={5.5} ry={7.5} EY={130}/>
        {mood==='surprised' ? <ellipse cx="100" cy="150" rx="6" ry="7" fill={PAL.mouth}/> : <path d="M92 148 q8 7 16 0" stroke={PAL.line} strokeWidth="3.5" fill="none" strokeLinecap="round"/>}
        <ellipse cx="68" cy="148" rx="10" ry="6.5" fill={PAL.blush} opacity="0.8"/><ellipse cx="132" cy="148" rx="10" ry="6.5" fill={PAL.blush} opacity="0.8"/>
      </svg>
    );
  }
  if (style==='water') {
    const dots=[[72,112],[118,104],[92,152],[138,128],[64,132],[108,158]];
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <defs><radialGradient id={uid+'w'} cx="0.42" cy="0.35" r="0.8"><stop offset="0" stopColor="#E4E0F7"/><stop offset="0.6" stopColor={body}/><stop offset="1" stopColor="#AFA7E0"/></radialGradient></defs>
        <path d={CUR_BODY} fill={`url(#${uid}w)`}/>
        <path d="M44 134 C58 178 142 178 156 134 C150 170 128 182 100 182 C72 182 50 170 44 134 Z" fill="#9087CE" opacity="0.32"/>
        <path d="M70 86 C92 78 120 80 138 92 C120 86 92 86 70 96 Z" fill="#FFFFFF" opacity="0.4"/>
        <path d={CUR_BODY} fill="none" stroke="#7E76B8" strokeWidth="2" strokeOpacity="0.4"/>
        <g fill="#5F5896" opacity="0.16">{dots.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="1.1"/>)}</g>
        {hat && <g><path d={HAT_PATH} fill={PAL.hat} fillOpacity="0.85"/><circle cx="106" cy="16" r="7" fill={PAL.pom} fillOpacity="0.92"/></g>}
        <Eyes style={style} mood={mood}/><MouthShape mood={mood}/>
        <ellipse cx="66" cy="146" rx="11" ry="7" fill={PAL.blush} opacity="0.5"/><ellipse cx="134" cy="146" rx="11" ry="7" fill={PAL.blush} opacity="0.5"/>
      </svg>
    );
  }
  if (style==='aura') {
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <defs><radialGradient id={uid+'a'} cx="0.5" cy="0.5" r="0.5"><stop offset="0" stopColor={PAL.hatHi} stopOpacity="0.5"/><stop offset="0.7" stopColor={PAL.hatHi} stopOpacity="0.12"/><stop offset="1" stopColor={PAL.hatHi} stopOpacity="0"/></radialGradient></defs>
        <circle cx="100" cy="124" r="92" fill={`url(#${uid}a)`}/>
        <circle cx="100" cy="124" r="78" fill="none" stroke={PAL.pom} strokeWidth="1.5" strokeOpacity="0.35" strokeDasharray="2 7"/>
        {sparkle && <><Spark x={170} y={70} s={1.2}/><Spark x={30} y={86}/><Spark x={150} y={170} s={0.8}/><Spark x={46} y={158} s={0.9}/><Spark x={178} y={128} s={0.7}/></>}
        <path d={CUR_BODY} fill={body} stroke={PAL.line} strokeWidth="5"/>
        <ellipse cx="78" cy="104" rx="20" ry="14" fill="#FFF" opacity="0.3"/>
        {hat && <HatFull/>}
        <Eyes style={style} mood={mood}/><MouthShape mood={mood}/>
        <ellipse cx="66" cy="146" rx="11" ry="7" fill={PAL.blush} opacity="0.7"/><ellipse cx="134" cy="146" rx="11" ry="7" fill={PAL.blush} opacity="0.7"/>
      </svg>
    );
  }
  if (style==='neon') {
    const g='#7DF5C4', p='#C9A0FF';
    return (
      <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
        <defs><filter id={uid+'n'} x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        <g filter={`url(#${uid}n)`} fill="none" strokeLinecap="round" strokeLinejoin="round">
          <path d={CUR_BODY} stroke={g} strokeWidth="3.5"/>
          {hat && <><path d={HAT_PATH} stroke={p} strokeWidth="3.5"/><circle cx="106" cy="16" r="7" stroke={PAL.pom} strokeWidth="3"/></>}
          {mood==='sleepy'||mood==='proud'
            ? <><path d="M69 128 q9 7 18 0" stroke={g} strokeWidth="3"/><path d="M113 128 q9 7 18 0" stroke={g} strokeWidth="3"/></>

  { id:'L19', name:'스팀 사발', note:'갓 지은 한 끼의 온기.',
    R:(p)=><LogoSteam c={p.ink} size={p.size}/> },
  { id:'L20', name:'픽셀 사발', note:'8bit 캐릭터와 한 세트로 갈 때.',
    R:(p)=><LogoPixelBowl c={p.ink} size={p.size}/> },
  { id:'L21', name:'모자 + 게이지 밴드', note:'매지 모자에 한도 링 밴드 — 캐릭터·기능 결합.',
    R:(p)=><LogoHatRing c={p.ink} size={p.size}/> },
  { id:'L22', name:'쌀 세 톨', note:'밥 한 끼의 최소 단위 — 소박한 일상.',
    R:(p)=><LogoGrain c={p.ink} size={p.size}/> },
  { id:'L23', name:'4점 다이아', note:'그릇 없이 영양소 4점만 — 가장 추상·미니멀.',
    R:(p)=><LogoDia c={p.ink} size={p.size}/> },
  { id:'L24', name:'스파크 링', note:'한도 링 안의 매직 스파크 — 기능→마법으로 뒤집기.',
    R:(p)=><LogoSparkRing c={p.ink} size={p.size}/> },
];

const LS_LOGO='magi-lab-logo';

function LogoBoard({ sel, setSel, mobile }) {
  return (
    <div style={{ flex:1, margin: mobile?'12px 14px 14px':'16px 26px 26px', borderRadius:24, background:'#FBFAFF',
      border:`1px solid ${PAL.cardLine}`, overflow: mobile?'visible':'auto', padding: mobile?12:20 }}>
      <div style={{ display:'grid', gridTemplateColumns:`repeat(auto-fill, minmax(${mobile?160:230}px, 1fr))`, gap:12 }}>
        {LOGOS.map(l=>{
          const on = sel===l.id;
          return (
            <div key={l.id} onClick={()=>setSel(l.id)} style={{ cursor:'pointer',
              background:'#FFFFFF', borderRadius:16, padding:'14px 14px 12px',
              border: on?`2.5px solid ${LG.green}`:`1px solid ${PAL.cardLine}`,
              boxShadow: on?'0 8px 20px rgba(31,122,82,0.18)':'0 2px 8px rgba(42,39,64,0.04)' }}>
              <div style={{ display:'flex', alignItems:'baseline', gap:8, marginBottom:8 }}>
                <span style={{ fontFamily:MONO, fontSize:10, fontWeight:800, color: on?LG.green:PAL.faint, letterSpacing:0.5 }}>{l.id}</span>
                <span style={{ fontSize:13.5, fontWeight:800, color:PAL.ink }}>{l.name}</span>
                {on && <span style={{ marginLeft:'auto', fontFamily:MONO, fontSize:9.5, fontWeight:800, color:'#FFF', background:LG.green, padding:'2px 7px', borderRadius:5 }}>선택됨</span>}
              </div>
              {/* hero */}
              <div style={{ height:110, background:LG.paper, borderRadius:12,
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                {l.R({ size:88, ink:LG.ink, tile:LG.paper })}
              </div>
              {/* contexts */}
              <div style={{ display:'flex', gap:8, alignItems:'center', marginTop:10 }}>
                <div style={{ width:40, height:40, borderRadius:10, background:'#FFFFFF', border:`1px solid ${PAL.cardLine}`,
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  {l.R({ size:30, ink:LG.ink, tile:'#FFFFFF' })}
                </div>
                <div style={{ width:40, height:40, borderRadius:10, background:LG.ink,
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  {l.R({ size:30, ink:'#FFFFFF', tile:LG.ink })}
                </div>
                <div style={{ width:40, height:40, borderRadius:10, background:LG.green,
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  {l.R({ size:30, ink:'#FFFFFF', tile:LG.green })}
                </div>
                <div style={{ marginLeft:'auto', display:'flex', flexDirection:'column', alignItems:'center', gap:2 }}>
                  {l.R({ size:16, ink:LG.ink, tile:LG.paper })}
                  <span style={{ fontFamily:MONO, fontSize:7.5, color:PAL.faint, fontWeight:700 }}>16px</span>
                </div>
              </div>
              <div style={{ fontSize:11, color:PAL.soft, lineHeight:1.5, fontWeight:500, marginTop:9 }}>{l.note}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── viewer ──
const STYLES = [
  ['sketch','기존 · 스케치'], ['current','현재 · 정제'], ['simple','심플 플랫'],
  ['sticker','스티커'], ['line','라인'], ['soft3d','소프트 3D'],
  ['pixel','픽셀 8bit'], ['retro','레트로 카툰'], ['clay','클레이'],
  ['kawaii','카와이'], ['papercut','페이퍼 컷'], ['pop','팝 코믹'],
  ['jelly','젤리'], ['gradient','그라디언트'], ['mochi','모찌'], ['water','수채'],
  ['aura','오라'], ['neon','네온'], ['riso','리소'], ['knit','뜨개'],
];
const MOODS = [['happy','반가워'],['smile','뿌듯'],['wink','윙크'],['proud','칭찬'],['surprised','놀람'],['sleepy','졸림']];

const LS_KEY='magi-lab-v1';
function load() { try { return JSON.parse(localStorage.getItem(LS_KEY))||{} } catch(e){ return {} } }

function Seg({ options, value, onChange, mini }) {
  return (
    <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
      {options.map(([v,l])=>(
        <button key={v} onClick={()=>onChange(v)} style={{
          padding: mini?'6px 10px':'8px 13px', borderRadius:10, cursor:'pointer',
          border: value===v ? `1.5px solid ${PAL.hat}` : `1px solid ${PAL.cardLine}`,
          background: value===v ? '#EFEDFB' : '#FFFFFF',
          color: value===v ? PAL.hat : PAL.ink,
          fontFamily:F, fontSize: mini?11.5:12.5, fontWeight:700, letterSpacing:-0.2,
        }}>{l}</button>
      ))}
    </div>
  );
}
function Toggle({ label, value, onChange }) {
  return (
    <button onClick={()=>onChange(!value)} style={{
      display:'flex', alignItems:'center', gap:8, padding:'7px 12px', borderRadius:10, cursor:'pointer',
      border:`1px solid ${PAL.cardLine}`, background:'#FFF', fontFamily:F, fontSize:12.5, fontWeight:700, color:PAL.ink }}>
      <span style={{ width:30, height:18, borderRadius:9, background: value?PAL.hat:'#D9D6E8', position:'relative', transition:'background 0.15s' }}>
        <span style={{ position:'absolute', top:2, left: value?14:2, width:14, height:14, borderRadius:7, background:'#FFF', transition:'left 0.15s' }}/>
      </span>
      {label}
    </button>
  );
}

function App() {
  const init = load();
  const [tab,setTab]=React.useState(init.tab||'char');
  const [style,setStyle]=React.useState(init.style||'current');
  const [mood,setMood]=React.useState(init.mood||'happy');
  const [body,setBody]=React.useState(init.body||'#C9C4F0');
  const [hat,setHat]=React.useState(init.hat!==false);
  const [sparkle,setSparkle]=React.useState(init.sparkle!==false);
  const [bg,setBg]=React.useState(init.bg||'paper');
  const [grid,setGrid]=React.useState(init.grid||false);
  const [selLogo,setSelLogo]=React.useState(()=>{ try { return localStorage.getItem(LS_LOGO)||'L1' } catch(e){ return 'L1' } });
  const [vw,setVw]=React.useState(window.innerWidth);
  React.useEffect(()=>{ const f=()=>setVw(window.innerWidth); window.addEventListener('resize',f); return ()=>window.removeEventListener('resize',f); },[]);
  const mobile = vw < 760;

  React.useEffect(()=>{ localStorage.setItem(LS_KEY, JSON.stringify({tab,style,mood,body,hat,sparkle,bg,grid})); },[tab,style,mood,body,hat,sparkle,bg,grid]);
  React.useEffect(()=>{ try { localStorage.setItem(LS_LOGO, selLogo) } catch(e){} },[selLogo]);

  const bgCol = BGS.find(b=>b[0]===bg)[1];
  const onDark = bg==='dark'||bg==='brand';
  const selName = LOGOS.find(l=>l.id===selLogo)?.name;

  return (
    <div style={{ position:'fixed', inset:0, display:'flex', flexDirection: mobile?'column':'row', fontFamily:F, background:'#F2F0EA', overflow: mobile?'auto':'hidden' }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        <div style={{ padding: mobile?'14px 14px 0':'18px 26px 0', display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
          <span style={{ fontSize:19, fontWeight:900, letterSpacing:-0.5, color:PAL.ink }}>Magic Kidney LAB</span>
          {/* tabs */}
          <div style={{ display:'flex', gap:4, background:'#FFFFFF', borderRadius:12, padding:3, border:`1px solid ${PAL.cardLine}` }}>
            {[['char','캐릭터 20'],['logo','로고 24']].map(([v,l])=>(
              <button key={v} onClick={()=>setTab(v)} style={{
                padding:'7px 14px', borderRadius:9, cursor:'pointer', border:'none',
                background: tab===v ? PAL.hat : 'transparent',
                color: tab===v ? '#FFF' : PAL.soft,
                fontFamily:F, fontSize:12.5, fontWeight:800, letterSpacing:-0.2 }}>{l}</button>
            ))}
          </div>
          <div style={{ flex:1 }}/>
          {tab==='char' && <Toggle label="모든 스타일 한눈에" value={grid} onChange={setGrid}/>}
        </div>

        {tab==='logo' ? (
          <LogoBoard sel={selLogo} setSel={setSelLogo} mobile={mobile}/>
        ) : (
          <div style={{ flex:1, margin: mobile?'12px 14px 14px':'16px 26px 26px', minHeight: mobile?380:0, borderRadius:24, background:bgCol,
            border:`1px solid ${PAL.cardLine}`, display:'flex', alignItems:'center', justifyContent:'center',
            transition:'background 0.2s', overflow:'auto' }}>
            {grid ? (
              <div style={{ display:'grid', gridTemplateColumns: mobile?'repeat(2, 1fr)':'repeat(4, 1fr)', gap:12, padding:16 }}>
                {STYLES.map(([s,l])=>(
                  <div key={s} onClick={()=>{setStyle(s);setGrid(false);}} style={{ cursor:'pointer',
                    background: onDark?'rgba(255,255,255,0.07)':'rgba(255,255,255,0.75)', borderRadius:16,
                    padding:'12px 8px 10px', display:'flex', flexDirection:'column', alignItems:'center', gap:6,
                    border: style===s?`2px solid ${PAL.pom}`:'2px solid transparent' }}>
                    <Wiz size={118} style={s} mood={mood} body={body} hat={hat} sparkle={sparkle} onDark={onDark}/>
                    <div style={{ fontSize:11.5, fontWeight:800, color: onDark?'#FFF':PAL.ink }}>{l}</div>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:14 }}>
                <Wiz size={mobile?230:340} style={style} mood={mood} body={body} hat={hat} sparkle={sparkle} onDark={onDark}/>
                <div style={{ fontFamily:MONO, fontSize:11, color: onDark?'rgba(255,255,255,0.6)':PAL.faint, letterSpacing:1.5, fontWeight:700 }}>
                  {STYLES.find(s=>s[0]===style)[1]} · {MOODS.find(m=>m[0]===mood)[1]}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* controls */}
      <div style={{ width: mobile?'auto':280, flexShrink:0, background:'#FFFFFF',
        borderLeft: mobile?'none':`1px solid ${PAL.cardLine}`, borderTop: mobile?`1px solid ${PAL.cardLine}`:'none',
        padding: mobile?'16px 14px 28px':'22px 20px', display:'flex', flexDirection:'column', gap:16, overflowY: mobile?'visible':'auto' }}>
        {tab==='logo' ? (
          <React.Fragment>
            <div>
              <div style={{ fontFamily:MONO, fontSize:9.5, color:PAL.faint, letterSpacing:1.4, textTransform:'uppercase', fontWeight:800, marginBottom:8 }}>선택된 로고</div>
              <div style={{ padding:'14px 16px', background:'#F1F8F4', border:`1.5px solid ${LG.green}`, borderRadius:14 }}>
                <div style={{ fontFamily:MONO, fontSize:10.5, fontWeight:800, color:LG.green }}>{selLogo}</div>
                <div style={{ fontSize:16, fontWeight:800, color:PAL.ink, marginTop:3 }}>{selName}</div>
              </div>
            </div>
            <div style={{ padding:'12px 14px', background:'#F6F5FB', borderRadius:12,
              fontSize:11.5, color:PAL.soft, lineHeight:1.6, fontWeight:500 }}>
              카드를 눌러 로고를 선택하세요. 선택은 저장됩니다.<br/><br/>
              <b>디자이너님께:</b> 마음에 드는 캐릭터 스타일 이름 + 로고 번호(예: "팝 코믹 + L1")를 회신해 주세요. L2·L5는 기존 안을 완전히 뒤집은 버전입니다.
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div>
              <div style={{ fontFamily:MONO, fontSize:9.5, color:PAL.faint, letterSpacing:1.4, textTransform:'uppercase', fontWeight:800, marginBottom:8 }}>스타일 · 20 versions</div>
              <Seg options={STYLES} value={style} onChange={setStyle} mini/>
            </div>
            <div>
              <div style={{ fontFamily:MONO, fontSize:9.5, color:PAL.faint, letterSpacing:1.4, textTransform:'uppercase', fontWeight:800, marginBottom:8 }}>표정 · Mood</div>
              <Seg options={MOODS} value={mood} onChange={setMood} mini/>
            </div>
            <div>
              <div style={{ fontFamily:MONO, fontSize:9.5, color:PAL.faint, letterSpacing:1.4, textTransform:'uppercase', fontWeight:800, marginBottom:8 }}>몸 색 · Body</div>
              <div style={{ display:'flex', gap:8 }}>
                {BODY_COLORS.map(([c,l])=>(
                  <button key={c} onClick={()=>setBody(c)} title={l} style={{
                    width:34, height:34, borderRadius:17, background:c, cursor:'pointer',
                    border: body===c?`3px solid ${PAL.hat}`:'2px solid rgba(42,39,64,0.12)' }}/>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontFamily:MONO, fontSize:9.5, color:PAL.faint, letterSpacing:1.4, textTransform:'uppercase', fontWeight:800, marginBottom:8 }}>배경 · Background</div>
              <Seg options={BGS.map(([v,,l])=>[v,l])} value={bg} onChange={setBg} mini/>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              <Toggle label="모자" value={hat} onChange={setHat}/>
              <Toggle label="반짝이" value={sparkle} onChange={setSparkle}/>
            </div>
            <div style={{ marginTop:'auto', padding:'12px 14px', background:'#F6F5FB', borderRadius:12,
              fontSize:11.5, color:PAL.soft, lineHeight:1.55, fontWeight:500 }}>
              <b>디자이너님께:</b> 스타일·표정·색을 조합해 보고, 마음에 드는 캐릭터 스타일 이름과 로고 탭의 번호를 회신해 주세요.
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
